spring:
  application:
    name: helpboys-api

  # MySQL 설정
  datasource:
    url: jdbc:mysql://localhost:3306/helpboys?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: helpboys
    password: helpboys1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# 서버 설정
server:
  port: 8080

# JWT 설정
jwt:
  secret: helpboys-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24시간 (밀리초)
